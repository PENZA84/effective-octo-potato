name: Nigma Cluster Search

on:
  schedule:
    - cron: '0 */6 * * *' # Авто-запуск каждые 6 часов
  workflow_dispatch: # Кнопка ручного запуска в меню

# Намертво прописываем права на запись для робота GitHub Actions
permissions:
  contents: write

jobs:
  search-and-cluster:
    runs-on: ubuntu-latest
    steps:
      - name: Проверка кода нашего репозитория
        uses: actions/checkout@v4
        with:
          persist-credentials: true # Говорим Гитхабу использовать встроенный токен авторизации

      - name: Установка обновленной Node.js (Версия 22 LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Запуск глобального поиска Нигма
        run: node nigma-search.js

      - name: Сохранение результатов в http.txt
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Проверяем наличие папок перед добавлением, чтобы избежать pathspec ошибок
          if [ -d "v2ray_config_collector/data/unique" ]; then
            git add v2ray_config_collector/data/unique/http.txt || true
          fi
          if [ -d "data/unique" ]; then
            git add data/unique/http.txt || true
          fi
          
          # Безопасный коммит: пушим только если появились реальные изменения
          if ! git diff --cached --quiet; then
            git commit -m "Нигма: добавлены новые глобальные RAW-ссылки"
            git push origin main
          else
            echo "Новых уникальных ссылок в этом цикле не найдено, рабочая директория чиста."
          fi
